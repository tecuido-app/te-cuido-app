services:
  agent:
    build: ./agent
    ports:
      - "8000:8000"
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  dashboard:
    build: ./dashboard
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      - NEXT_PUBLIC_AGENT_URL=http://agent:8000
    depends_on:
      agent:
        condition: service_healthy
    restart: unless-stopped
